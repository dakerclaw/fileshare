<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快分享</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f7;
    --surface: #ffffff;
    --surface2: #f5f6fa;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #18181b;
    --text2: #52525b;
    --text3: #a1a1aa;
    --accent: #4f6ef7;
    --accent2: #6b84f8;
    --accent-light: #eef1fe;
    --accent-grad: linear-gradient(135deg, #4f6ef7 0%, #7c5cfa 100%);
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --success-border: rgba(22,163,74,0.2);
    --danger: #dc2626;
    --danger-bg: #fff5f5;
    --danger-border: rgba(220,38,38,0.2);
    --radius: 14px;
    --radius-sm: 9px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 17px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent-grad);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(79,110,247,0.35);
  }
  .logo-icon svg { width: 17px; height: 17px; fill: none; stroke: white; stroke-width: 2.2; }

  .logo-tag {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-light);
    border-radius: 100px;
    padding: 2px 8px;
    margin-left: 2px;
    letter-spacing: 0;
  }

  .stats-bar {
    font-size: 12px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stats-prog-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: 100px;
    padding: 4px 10px 4px 8px;
  }
  .stats-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .prog { width: 60px; height: 3px; background: rgba(0,0,0,0.08); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--accent-grad); border-radius: 2px; transition: width 0.4s ease; }

  /* ── Main ── */
  .main { max-width: 680px; margin: 0 auto; padding: 36px 16px 80px; }

  /* ── Hero ── */
  .hero {
    text-align: center;
    margin-bottom: 32px;
  }
  .hero-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: var(--accent-grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .hero-sub { font-size: 14px; color: var(--text3); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 5px;
    border: 0.5px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .tab {
    flex: 1; padding: 10px 16px;
    border: none; background: transparent;
    border-radius: calc(var(--radius) - 3px);
    font-size: 14px; font-weight: 500;
    color: var(--text2); cursor: pointer;
    transition: background 0.18s, color 0.18s, box-shadow 0.18s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .tab svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }
  .tab.active {
    background: var(--accent-grad);
    color: white;
    box-shadow: 0 2px 8px rgba(79,110,247,0.3);
  }
  .tab:hover:not(.active) { background: var(--surface2); color: var(--text); }

  /* ── Panels ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }

  /* ── Form elements ── */
  textarea {
    width: 100%; border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 13px 14px; font-size: 14px; font-family: inherit;
    resize: vertical; min-height: 200px;
    background: var(--surface2); color: var(--text);
    outline: none; transition: border-color 0.15s, background 0.15s;
    line-height: 1.7;
  }
  textarea:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px rgba(79,110,247,0.1); }
  textarea::placeholder { color: var(--text3); }

  /* ── Drop zone ── */
  .dropzone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 44px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.18s;
    background: var(--surface2);
    position: relative;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .dropzone.dragover { border-style: solid; }
  .dropzone input[type=file] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }
  .dz-icon-wrap {
    width: 56px; height: 56px; margin: 0 auto 14px;
    background: var(--accent-light);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .dz-icon-wrap svg { width: 26px; height: 26px; stroke: var(--accent); fill: none; stroke-width: 1.8; }
  .dz-title { font-size: 15px; font-weight: 600; margin-bottom: 5px; color: var(--text); }
  .dz-sub { font-size: 13px; color: var(--text3); }
  .dz-badge {
    display: inline-block; margin-top: 10px;
    font-size: 11px; font-weight: 500;
    color: var(--accent); background: var(--accent-light);
    border-radius: 100px; padding: 3px 10px;
  }

  /* ── File list ── */
  .file-list { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .file-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px;
    background: var(--surface2); border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    transition: border-color 0.15s;
  }
  .file-item:hover { border-color: var(--border2); }
  .file-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .file-icon svg { width: 17px; height: 17px; stroke: var(--accent); fill: none; stroke-width: 2; }
  .file-meta { flex: 1; min-width: 0; }
  .file-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .file-remove {
    background: none; border: none; cursor: pointer;
    color: var(--text3); padding: 5px; border-radius: 6px; display: flex;
    transition: color 0.15s, background 0.15s;
  }
  .file-remove:hover { color: var(--danger); background: var(--danger-bg); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 10px 20px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; cursor: pointer;
    border: 0.5px solid transparent;
    transition: opacity 0.15s, background 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--accent-grad);
    color: white;
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(79,110,247,0.3);
  }
  .btn-primary:hover:not(:disabled) { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
  .btn-ghost {
    background: transparent; color: var(--text2);
    border-color: var(--border2);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-full { width: 100%; justify-content: center; margin-top: 20px; padding: 13px 20px; font-size: 15px; border-radius: var(--radius-sm); }

  /* ── Char count ── */
  .char-count {
    font-size: 12px; color: var(--text3);
    text-align: right; margin-top: 6px;
  }

  /* ── Result card ── */
  .result-card {
    background: var(--success-bg);
    border: 0.5px solid var(--success-border);
    border-radius: var(--radius); padding: 24px;
    margin-top: 16px; display: none;
    box-shadow: var(--shadow);
  }
  .result-card.show { display: block; animation: fadeSlideUp 0.25s ease; }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex; align-items: center; gap: 9px; margin-bottom: 20px;
  }
  .result-header-icon {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--success); display: flex; align-items: center; justify-content: center;
  }
  .result-header-icon svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2.5; }
  .result-header span { font-size: 15px; font-weight: 600; color: var(--success); }

  .result-body { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
  .result-qr img {
    width: 110px; height: 110px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    display: block;
  }
  .result-qr-label {
    font-size: 11px; color: var(--text3);
    text-align: center; margin-top: 5px;
  }
  .result-info { flex: 1; min-width: 200px; }
  .result-label { font-size: 12px; color: var(--text3); margin-bottom: 5px; font-weight: 500; letter-spacing: 0.2px; }
  .result-url {
    font-size: 13px; font-weight: 500; color: var(--accent);
    word-break: break-all; margin-bottom: 14px;
    background: rgba(79,110,247,0.06); border-radius: 6px;
    padding: 8px 10px; border: 0.5px solid rgba(79,110,247,0.15);
  }
  .result-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .copy-btn { font-size: 13px; padding: 7px 16px; }
  .copied-hint {
    font-size: 12px; color: var(--success);
    display: inline-flex; align-items: center; gap: 4px;
    opacity: 0; transition: opacity 0.2s; margin-left: 4px;
  }
  .copied-hint.show { opacity: 1; }

  /* ── Share view ── */
  .share-view { display: none; }
  .share-view.active { display: block; }

  .text-content {
    white-space: pre-wrap;
    font-family: 'Menlo', 'Consolas', 'SF Mono', monospace;
    font-size: 13px; line-height: 1.75;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    max-height: 60vh; overflow: auto;
    word-break: break-all;
    color: var(--text);
  }

  .dl-list { display: flex; flex-direction: column; gap: 10px; }
  .dl-item {
    display: flex; align-items: center; gap: 13px;
    padding: 13px 16px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    transition: background 0.15s, border-color 0.15s;
  }
  .dl-item:hover { background: var(--accent-light); border-color: rgba(79,110,247,0.2); }
  .dl-icon {
    width: 38px; height: 38px; border-radius: 9px;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .dl-icon svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 2; }
  .dl-meta { flex: 1; min-width: 0; }
  .dl-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dl-size { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .dl-btn { flex-shrink: 0; padding: 7px 18px; font-size: 13px; }

  /* ── Error ── */
  .err-box {
    background: var(--danger-bg); border: 0.5px solid var(--danger-border);
    border-radius: var(--radius-sm); padding: 12px 16px; color: var(--danger);
    font-size: 13px; margin-top: 12px; display: none;
  }
  .err-box.show { display: flex; align-items: center; gap: 8px; }
  .err-box::before { content: '!'; width: 18px; height: 18px; background: var(--danger); color: white; border-radius: 50%; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* ── Progress ── */
  .upload-progress { display: none; margin-top: 16px; }
  .upload-progress.show { display: block; }
  .prog-bar-wrap {
    background: rgba(79,110,247,0.1);
    border-radius: 6px; height: 7px; overflow: hidden; margin-top: 8px;
  }
  .prog-bar-fill {
    height: 100%; background: var(--accent-grad);
    border-radius: 6px; width: 0%;
    transition: width 0.1s;
  }
  .prog-label { font-size: 12px; color: var(--accent); margin-top: 5px; text-align: right; font-weight: 500; }

  /* ── Meta chips ── */
  .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .meta-chip {
    font-size: 12px; color: var(--text2);
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 100px; padding: 3px 11px;
    box-shadow: var(--shadow-sm);
  }

  /* ── Empty / Spinner ── */
  .empty-state { text-align: center; padding: 56px 24px; color: var(--text3); }
  .empty-state p { font-size: 14px; margin-top: 10px; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.55s linear infinite;
    display: inline-block; vertical-align: middle;
  }
  .spinner-dark {
    border-color: rgba(79,110,247,0.2);
    border-top-color: var(--accent);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Divider ── */
  .section-divider {
    display: flex; align-items: center; gap: 12px;
    color: var(--text3); font-size: 12px; margin: 20px 0 16px;
  }
  .section-divider::before, .section-divider::after {
    content: ''; flex: 1; height: 0.5px; background: var(--border2);
  }

  /* ── Responsive ── */
  @media (max-width: 540px) {
    .main { padding: 24px 12px 60px; }
    .hero-title { font-size: 22px; }
    .result-body { flex-direction: column; }
    .result-qr img { width: 100px; height: 100px; }
    .header { padding: 0 16px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
    </div>
    快分享
  </div>
</header>

<main class="main" id="appRoot">

  <div id="homeView">
    <div class="hero">
      <div class="hero-title">快速分享，随取随用</div>
      <div class="hero-sub">粘贴文字或上传文件，一键生成分享链接</div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('text')">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        文字分享
      </button>
      <button class="tab" onclick="switchTab('files')">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        文件分享
      </button>
    </div>

    <!-- ── Text panel ── -->
    <div class="panel active" id="panelText">
      <div class="card">
        <textarea id="textContent" placeholder="粘贴文字、代码、链接……任何内容，直接开始输入" oninput="updateCharCount()"></textarea>
        <div class="char-count" id="charCount">0 字符</div>
        <div class="err-box" id="textErr"></div>
        <button class="btn btn-primary btn-full" id="textSubmitBtn" onclick="submitText()">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          生成分享链接
        </button>
      </div>
      <div class="result-card" id="textResult"></div>
    </div>

    <!-- ── Files panel ── -->
    <div class="panel" id="panelFiles">
      <div class="card">
        <div class="dropzone" id="dropzone">
          <input type="file" id="fileInput" multiple onchange="handleFileSelect(this.files)">
          <div class="dz-icon-wrap">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <p class="dz-title">拖放文件到这里</p>
          <p class="dz-sub">或点击选择文件，支持多文件同时上传</p>
          <span class="dz-badge">单文件最大 2 GB</span>
        </div>

        <div class="file-list" id="fileList"></div>

        <div class="upload-progress" id="uploadProgress">
          <div style="font-size:13px;color:var(--text2);font-weight:500">正在上传，请稍候…</div>
          <div class="prog-bar-wrap"><div class="prog-bar-fill" id="progBarFill"></div></div>
          <div class="prog-label" id="progLabel">0%</div>
        </div>

        <div class="err-box" id="filesErr"></div>
        <button class="btn btn-primary btn-full" id="filesSubmitBtn" onclick="submitFiles()" disabled>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          生成分享链接
        </button>
      </div>
      <div class="result-card" id="filesResult"></div>
    </div>
  </div>

  <!-- ── Share view ── -->
  <div id="shareView" class="share-view"></div>

</main>

<script>
let selectedFiles = [];
let currentTab = 'text';

document.addEventListener('DOMContentLoaded', () => {
  loadStats();
  const m = window.location.pathname.match(/^\/s\/([a-f0-9]{6,16})$/);
  if (m) showShareView(m[1]);
  setupDragDrop();
});

/* ── Stats ── */
async function loadStats() {
  try {
    const d = await fetch('/api/stats').then(r => r.json());
    document.getElementById('globalProg').style.width = d.used_pct + '%';
    document.getElementById('statsText').textContent =
      formatSize(d.used) + ' / 5 GB';
    const dot = document.getElementById('statsDot');
    dot.style.background = d.used_pct > 85 ? '#f59e0b' : 'var(--accent)';
  } catch (e) {}
}

/* ── Tabs ── */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'text') || (i === 1 && tab === 'files'));
  });
  document.getElementById('panelText').classList.toggle('active', tab === 'text');
  document.getElementById('panelFiles').classList.toggle('active', tab === 'files');
}

/* ── Char count ── */
function updateCharCount() {
  const n = document.getElementById('textContent').value.length;
  document.getElementById('charCount').textContent = n.toLocaleString('zh-CN') + ' 字符';
}

/* ── Text submit ── */
async function submitText() {
  const content = document.getElementById('textContent').value.trim();
  const errBox = document.getElementById('textErr');
  const btn = document.getElementById('textSubmitBtn');
  showErr(errBox, '');
  if (!content) { showErr(errBox, '请输入要分享的文字内容'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 生成中…';
  try {
    const r = await fetch('/api/text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, title: '' })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || '服务器错误');
    showResult('textResult', d);
    loadStats();
  } catch (e) {
    showErr(errBox, e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> 生成分享链接`;
  }
}

/* ── File selection ── */
function handleFileSelect(files) {
  for (const f of files) {
    if (!selectedFiles.find(x => x.name === f.name && x.size === f.size)) selectedFiles.push(f);
  }
  renderFileList();
}

function removeFile(idx) { selectedFiles.splice(idx, 1); renderFileList(); }

function renderFileList() {
  const list = document.getElementById('fileList');
  const btn = document.getElementById('filesSubmitBtn');
  btn.disabled = selectedFiles.length === 0;
  if (!selectedFiles.length) { list.innerHTML = ''; return; }
  const totalSize = selectedFiles.reduce((s, f) => s + f.size, 0);
  list.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 4px 2px;font-size:13px;color:var(--text2)">
      <span style="font-weight:500">${selectedFiles.length} 个文件</span>
      <span style="color:var(--text3)">共 ${formatSize(totalSize)}</span>
    </div>` +
    selectedFiles.map((f, i) => `
    <div class="file-item">
      <div class="file-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="file-meta">
        <div class="file-name" title="${esc(f.name)}">${esc(f.name)}</div>
        <div class="file-size">${formatSize(f.size)}</div>
      </div>
      <button class="file-remove" onclick="removeFile(${i})" title="移除">
        <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join('');
}

/* ── File submit ── */
async function submitFiles() {
  const errBox = document.getElementById('filesErr');
  const btn = document.getElementById('filesSubmitBtn');
  const prog = document.getElementById('uploadProgress');
  showErr(errBox, '');
  if (!selectedFiles.length) { showErr(errBox, '请先选择要上传的文件'); return; }
  const MAX_F = 2 * 1024 * 1024 * 1024;
  for (const f of selectedFiles) {
    if (f.size > MAX_F) { showErr(errBox, `文件「${f.name}」超过单文件 2 GB 限制`); return; }
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 上传中…';
  prog.classList.add('show');

  const fd = new FormData();
  fd.append('title', '');
  for (const f of selectedFiles) fd.append('files', f);

  try {
    const result = await uploadWithProgress(fd);
    showResult('filesResult', result);
    selectedFiles = [];
    renderFileList();
    document.getElementById('fileInput').value = '';
    loadStats();
  } catch (e) {
    showErr(errBox, e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> 生成分享链接`;
    prog.classList.remove('show');
  }
}

function uploadWithProgress(fd) {
  return new Promise((res, rej) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/files');
    xhr.upload.addEventListener('progress', e => {
      if (e.lengthComputable) {
        const pct = Math.round(e.loaded / e.total * 100);
        document.getElementById('progBarFill').style.width = pct + '%';
        document.getElementById('progLabel').textContent = pct + '%';
      }
    });
    xhr.addEventListener('load', () => {
      try {
        const d = JSON.parse(xhr.responseText);
        xhr.status >= 400 ? rej(new Error(d.error || '上传失败')) : res(d);
      } catch { rej(new Error('解析响应失败')); }
    });
    xhr.addEventListener('error', () => rej(new Error('网络错误，请重试')));
    xhr.send(fd);
  });
}

/* ── Result display ── */
function showResult(targetId, data) {
  const el = document.getElementById(targetId);
  const qrHtml = data.qr ? `
    <div class="result-qr">
      <img src="data:image/png;base64,${data.qr}" alt="二维码">
      <div class="result-qr-label">扫码获取</div>
    </div>` : '';
  el.innerHTML = `
    <div class="result-header">
      <div class="result-header-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <span>分享链接已就绪</span>
    </div>
    <div class="result-body">
      ${qrHtml}
      <div class="result-info">
        <div class="result-label">分享链接</div>
        <div class="result-url">${data.url}</div>
        <div class="result-actions">
          <button class="btn btn-ghost copy-btn" onclick="copyUrl('${data.id}', '${data.url}')">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            复制链接
          </button>
          <a href="${data.url}" target="_blank" class="btn btn-ghost copy-btn" style="text-decoration:none">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            打开分享页
          </a>
        </div>
        <span class="copied-hint" id="hint_${data.id}">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          已复制
        </span>
      </div>
    </div>`;
  el.classList.add('show');
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyUrl(id, url) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(url).then(() => {
      showCopiedHint(id);
    }).catch(() => fallbackCopy(url, id));
  } else {
    fallbackCopy(url, id);
  }
}

function fallbackCopy(text, id) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); showCopiedHint(id); } catch {}
  document.body.removeChild(ta);
}

function showCopiedHint(id) {
  const h = document.getElementById('hint_' + id);
  if (!h) return;
  h.classList.add('show');
  setTimeout(() => h.classList.remove('show'), 2200);
}

/* ── Share view ── */
async function showShareView(shareId) {
  document.getElementById('homeView').style.display = 'none';
  const view = document.getElementById('shareView');
  view.classList.add('active');
  view.innerHTML = `<div class="empty-state"><span class="spinner spinner-dark" style="width:32px;height:32px;border-width:3px"></span><p>加载中…</p></div>`;
  try {
    const r = await fetch('/api/share/' + shareId);
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || '加载失败');
    renderShareView(view, d);
  } catch (e) {
    view.innerHTML = `
      <div class="card" style="text-align:center;padding:56px 24px">
        <svg viewBox="0 0 24 24" width="44" height="44" style="stroke:var(--danger);fill:none;stroke-width:1.5;margin-bottom:16px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p style="font-size:17px;font-weight:600;color:var(--text);margin-bottom:8px">内容不存在</p>
        <p style="color:var(--text3);margin-bottom:24px;font-size:14px">${esc(e.message)}</p>
        <a href="/" class="btn btn-ghost" style="text-decoration:none">← 返回首页</a>
      </div>`;
  }
}

function renderShareView(view, d) {
  const created = new Date(d.created_at * 1000).toLocaleString('zh-CN');
  const isText = d.type === 'text';
  const typeLabel = isText ? '文字分享' : `文件分享`;

  let bodyHtml = '';
  if (isText) {
    const bytes = new Blob([d.content]).size;
    bodyHtml = `
      <div class="meta-row">
        <span class="meta-chip">${typeLabel}</span>
        <span class="meta-chip">${formatSize(bytes)}</span>
        <span class="meta-chip">${created}</span>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <span style="font-size:14px;font-weight:600;color:var(--text)">内容</span>
          <button class="btn btn-ghost" style="font-size:12px;padding:5px 13px;gap:5px" onclick="copyText()">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            复制内容
          </button>
        </div>
        <pre class="text-content" id="shareTextContent">${esc(d.content)}</pre>
      </div>`;
  } else {
    const totalSize = d.files.reduce((s, f) => s + f.size, 0);
    bodyHtml = `
      <div class="meta-row">
        <span class="meta-chip">${typeLabel}</span>
        <span class="meta-chip">${d.files.length} 个文件</span>
        <span class="meta-chip">共 ${formatSize(totalSize)}</span>
        <span class="meta-chip">${created}</span>
      </div>
      <div class="card">
        <div style="font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text)">文件列表</div>
        <div class="dl-list">${d.files.map(f => `
          <div class="dl-item">
            <div class="dl-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
            <div class="dl-meta">
              <div class="dl-name" title="${esc(f.filename)}">${esc(f.filename)}</div>
              <div class="dl-size">${formatSize(f.size)}</div>
            </div>
            <a href="/api/download/${f.file_id}" class="btn btn-primary dl-btn" download="${esc(f.filename)}">下载</a>
          </div>`).join('')}
        </div>
      </div>`;
  }

  view.innerHTML = `
    <div style="margin-bottom:20px">
      <a href="/" class="btn btn-ghost" style="text-decoration:none;font-size:13px;padding:8px 16px;gap:6px">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
        返回首页
      </a>
    </div>
    ${bodyHtml}`;
}

function copyText() {
  const el = document.getElementById('shareTextContent');
  if (el) navigator.clipboard.writeText(el.textContent);
}

/* ── Drag & drop ── */
function setupDragDrop() {
  const dz = document.getElementById('dropzone');
  if (!dz) return;
  ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('dragover'); }));
  dz.addEventListener('dragleave', e => { if (!dz.contains(e.relatedTarget)) dz.classList.remove('dragover'); });
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); handleFileSelect(e.dataTransfer.files); });
}

/* ── Helpers ── */
function formatSize(b) {
  if (!b) return '0 B';
  const u = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return (b / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + u[i];
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showErr(el, msg) {
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
  el.style.display = msg ? 'flex' : 'none';
}
</script>
